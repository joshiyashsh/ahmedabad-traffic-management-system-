<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.APPLICATION_NAME }}</title>
    
    <!-- Google Fonts: Inter and Roboto Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Core App Styles -->
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: #F8FAFC; }
        .mono-font { font-family: 'Roboto Mono', monospace; }
        
        /* App Layout Styles */
        .app-wrapper { display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }
        .app-header { background: #1E293B; border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 1030; display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1.5rem; height: 65px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .app-body { display: flex; flex: 1; overflow: hidden; }
        .app-sidebar { width: 260px; background: #1E293B; border-right: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; transition: width 0.3s ease; z-index: 1020; }
        .app-main { flex: 1; overflow-y: auto; overflow-x: hidden; background-color: #0F172A; position: relative; }
        
        /* Sidebar Styles */
        .sidebar-nav { list-style: none; padding: 0; margin: 1.5rem 0; flex: 1; }
        .sidebar-link { display: flex; align-items: center; padding: 0.85rem 1.5rem; color: #94A3B8; text-decoration: none; transition: all 0.2s; font-weight: 500; font-size: 0.95rem; }
        .sidebar-link:hover { color: #F8FAFC; background: rgba(59, 130, 246, 0.1); }
        .sidebar-link.active { color: #3B82F6; background: rgba(59, 130, 246, 0.15); border-right: 3px solid #3B82F6; font-weight: 600; }
        .sidebar-link i { width: 26px; font-size: 1.15rem; }
        .sidebar-link.disabled { color: #475569; pointer-events: none; }
        
        /* Header elements */
        .header-brand { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.15rem; color: #F8FAFC; }
        .header-brand i { color: #3B82F6; font-size: 1.4rem; }
        .header-brand-light { color: #94A3B8; font-weight: 400; font-size: 1.05rem; margin-left: 4px; }
        
        .header-clock { font-family: 'Roboto Mono', monospace; color: #10B981; font-weight: 500; padding: 0.4rem 1rem; background: rgba(16, 185, 129, 0.1); border-radius: 8px; border: 1px solid rgba(16, 185, 129, 0.2); }
        .header-user { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; }
        .user-avatar { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #3B82F6, #1D4ED8); display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; }
        
        /* Custom Scrollbar for App Main */
        .app-main::-webkit-scrollbar { width: 8px; }
        .app-main::-webkit-scrollbar-track { background: #0F172A; }
        .app-main::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .app-main::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
    
    {% block styles %}{% endblock %}
</head>
<body class="bg-dark text-light">
    
    <div class="app-wrapper">
        <!-- Header -->
        <header class="app-header">
            <div class="header-brand d-flex align-items-center">
                {% block header_brand %}
                <i class="fa-solid fa-building-shield"></i>
                <span class="d-none d-md-inline ms-2">Ahmedabad Smart City <span class="header-brand-light">| Traffic Operations Center</span></span>
                <span class="d-inline d-md-none ms-2">ASTMS</span>
                {% endblock %}
            </div>
            
            <div class="d-flex align-items-center gap-4">
                <div class="header-clock d-none d-lg-flex align-items-center gap-2">
                    <i class="fa-regular fa-clock"></i>
                    <span id="live-clock">--:--:--</span>
                    <span class="ms-2 text-muted" id="live-date" style="font-size: 0.8rem;">----</span>
                </div>
                
                <div class="header-user">
                    <div class="user-avatar"><i class="fa-solid fa-user-shield"></i></div>
                    <div class="d-none d-sm-block lh-1 text-end">
                        <div class="fw-semibold">Officer</div>
                        <small class="text-secondary" style="font-size: 0.75rem;">Administrator</small>
                    </div>
                    <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-danger ms-2 d-flex align-items-center" title="Logout" style="height: 36px;">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </a>
                </div>
            </div>
        </header>

        <div class="app-body">
            <!-- Sidebar -->
            <nav class="app-sidebar d-none d-md-flex">
                <ul class="sidebar-nav">
                    <li><a href="{{ url_for('dashboard') }}" class="sidebar-link active"><i class="fa-solid fa-desktop"></i> Operations Center</a></li>
                </ul>
                <div class="mt-auto mb-4 px-4">
                    <a href="{{ url_for('logout') }}" class="btn btn-outline-secondary w-100 text-start d-flex align-items-center" style="background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.05);">
                        <i class="fa-solid fa-door-open me-3 text-secondary"></i> Logout
                    </a>
                </div>
            </nav>
            
            <!-- Main Content Area -->
            <main class="app-main">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Global live clock for authenticated layout
        document.addEventListener('DOMContentLoaded', () => {
            const clockEl = document.getElementById('live-clock');
            const dateEl = document.getElementById('live-date');
            if (clockEl && dateEl) {
                function updateClock() {
                    const now = new Date();
                    clockEl.textContent = now.toLocaleTimeString('en-US', { hour12: false });
                    dateEl.textContent = now.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                }
                setInterval(updateClock, 1000);
                updateClock();
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
